name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest semver tag
        id: latest_tag
        run: |
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "tag=${LATEST:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Determine version bump
        id: version
        run: |
          LATEST="${{ steps.latest_tag.outputs.tag }}"

          if [ "$LATEST" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log --pretty=format:"%s" "${LATEST}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No commits since last tag, skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Breaking changes → major
          if echo "$COMMITS" | grep -qE "^(feat|fix|refactor|build|chore|ci|docs|style|test|perf|revert)(\(.+\))?!:" \
          || echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
            BUMP="major"
          # New features → minor
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          # Bug fixes, perf, reverts → patch
          elif echo "$COMMITS" | grep -qE "^(fix|perf|revert)(\(.+\))?:"; then
            BUMP="patch"
          else
            echo "Only non-releasable commits found (build/chore/ci/docs/style/test/refactor), skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)

          if [ "$BUMP" = "major" ]; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
          elif [ "$BUMP" = "minor" ]; then
            NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
          else
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Determined bump: ${BUMP} → v${NEW_VERSION}"

      - name: Install Rust
        if: steps.version.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Bump version in Cargo.toml and Cargo.lock
        if: steps.version.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          sed -i "s/^version = \"[0-9]*\.[0-9]*\.[0-9]*\"/version = \"${NEW_VERSION}\"/" Cargo.toml
          cargo update --workspace --quiet

      - name: Commit, tag, and push
        if: steps.version.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: release v${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push origin main
          git push origin "v${NEW_VERSION}"

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        run: |
          gh release create "v${{ steps.version.outputs.new_version }}" \
            --title "v${{ steps.version.outputs.new_version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
