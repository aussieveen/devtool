name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest semver tag
        id: latest_tag
        run: |
          LATEST=$(git tag --sort=-version:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "tag=${LATEST:-0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Determine version bump
        id: version
        run: |
          LATEST="${{ steps.latest_tag.outputs.tag }}"
          # Strip v prefix for arithmetic
          LATEST_BARE="${LATEST#v}"

          if [ "$LATEST_BARE" = "0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log --pretty=format:"%s" "${LATEST}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No commits since last tag, skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Breaking changes → major
          if echo "$COMMITS" | grep -qE "^(feat|fix|refactor|build|chore|ci|docs|style|test|perf|revert)(\(.+\))?!:" \
          || echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
            BUMP="major"
          # New features → minor
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          # Bug fixes, perf, reverts → patch
          elif echo "$COMMITS" | grep -qE "^(fix|perf|revert)(\(.+\))?:"; then
            BUMP="patch"
          else
            echo "Only non-releasable commits found (build/chore/ci/docs/style/test/refactor), skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MAJOR=$(echo "$LATEST_BARE" | cut -d. -f1)
          MINOR=$(echo "$LATEST_BARE" | cut -d. -f2)
          PATCH=$(echo "$LATEST_BARE" | cut -d. -f3)

          if [ "$BUMP" = "major" ]; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
          elif [ "$BUMP" = "minor" ]; then
            NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
          else
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Determined bump: ${BUMP} → ${NEW_VERSION}"

      - name: Tag and push
        if: steps.version.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          git tag "${NEW_VERSION}"
          git push origin "${NEW_VERSION}"

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        run: |
          gh release create "${{ steps.version.outputs.new_version }}" \
            --title "${{ steps.version.outputs.new_version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
